name = "scoreboard_unified"
version = "0.1.0"

[dependencies]
gleam_stdlib = ">= 0.60.0 and < 2.0.0"
lustre = ">= 5.7.0 and < 7.0.0"
sqlight = ">= 1.0.0 and < 2.0.0"
mist = ">= 6.0.3 and < 7.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_crypto = ">= 1.6.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
libero = { path = "../libero" }

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
birdie = ">= 2.0.0 and < 3.0.0"
glinter = ">= 2.19.0 and < 3.0.0"
marmot = { path = "../marmot" }
proute = { path = "../proute" }
rally = { path = "../rally-gleam" }

[tools.glinter]
stats = true
warnings_as_errors = true
exclude = ["src/generated/**/*.gleam"]
scan_paths = ["src"]

[tools.marmot]
database = "db/scoreboard.db"
output = "src/generated/sql"

[tools.rally.load_rpc.push]
module = "broadcasts"
type = "Event"
