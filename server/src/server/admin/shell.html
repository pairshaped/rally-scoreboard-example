<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
  <script src="https://unpkg.com/@knadh/oat/oat.min.js" defer></script>
  <style>
    :root {
      color-scheme: light;
      --score-ink: #132238;
      --score-muted: #5c6878;
      --score-line: #d7dde5;
      --score-panel: #ffffff;
      --score-bg: #f4f6f8;
      --score-live: #c83b2b;
      --score-win: #116d5b;
      --score-blue: #2764a6;
      --score-gold: #c2871f;
      --score-action: #132238;
      --score-action-foreground: #ffffff;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --score-ink: #e9eef6;
      --score-muted: #a7b0bf;
      --score-line: #324157;
      --score-panel: #141d2b;
      --score-bg: #0d1320;
      --score-live: #ff7a6b;
      --score-win: #5bd3b4;
      --score-blue: #6aa7ff;
      --score-gold: #f0bd56;
      --score-action: #2f6fbd;
      --score-action-foreground: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--score-bg);
      color: var(--score-ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .scoreboard-app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }

    .topbar, .panel, .game-card, .stat-card {
      background: var(--score-panel);
      border: 1px solid var(--score-line);
      border-radius: 8px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 750;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--score-blue);
      color: white;
      font-weight: 800;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav a {
      color: var(--score-muted);
      text-decoration: none;
      padding: 7px 10px;
      border-radius: 6px;
    }

    .nav a.active {
      color: var(--score-ink);
      background: #e6edf5;
    }

    :root[data-theme="dark"] .nav a.active {
      background: #25344a;
    }

    .theme-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--score-muted);
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .theme-switch input {
      margin: 0;
    }

    .theme-icon {
      flex: 0 0 auto;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.15;
      margin-bottom: 4px;
    }

    h2 {
      font-size: 18px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .muted {
      color: var(--score-muted);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .game-card {
      padding: 14px;
    }

    .team-row, .score-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .admin-score-row {
      display: grid;
      grid-template-columns: minmax(7ch, 1fr) 32px 32px 4ch;
      align-items: center;
      gap: 8px;
    }

    .admin-score-row + .admin-score-row {
      margin-top: 8px;
    }

    .admin-status-row {
      margin-top: 12px;
    }

    .score-control {
      min-width: 32px;
      padding-inline: 8px;
    }

    .admin-score-row .score {
      text-align: right;
    }

    .score {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2f6;
      color: var(--score-muted);
      font-size: 13px;
      font-weight: 650;
    }

    .badge.live {
      background: #ffe7e2;
      color: var(--score-live);
    }

    .badge.final {
      background: #e0f3ee;
      color: var(--score-win);
    }

    :root[data-theme="dark"] .badge {
      background: #243248;
    }

    :root[data-theme="dark"] .badge.live {
      background: #44211d;
    }

    :root[data-theme="dark"] .badge.final {
      background: #18362f;
    }

    .standings-table {
      width: 100%;
      border-collapse: collapse;
    }

    .standings-table th, .standings-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--score-line);
      text-align: left;
    }

    .standings-table th {
      color: var(--score-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .admin-tools {
      display: grid;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar input {
      max-width: 90px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button, .button-link {
      border-radius: 6px;
      border: 1px solid var(--score-line);
      background: var(--score-action);
      color: var(--score-action-foreground);
      padding: 8px 10px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button.secondary, .button-link.secondary {
      background: white;
      color: var(--score-ink);
    }

    :root[data-theme="dark"] button.secondary,
    :root[data-theme="dark"] .button-link.secondary {
      background: #101827;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
  <script>
    (function() {
      var match = document.cookie.match(/(?:^|; )scoreboard_dark_mode=(\d)/);
      var dark = match
        ? match[1] === "1"
        : window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = dark ? "dark" : "light";
    })()
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" data-runtime-client>
    import { main } from "/_build/client/scoreboard_admin_client.mjs";
    main();
  </script>
</body>
</html>
